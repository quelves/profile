# Docker Swarm Stack — Mega Sales Platform (MSP)
# Optimizado para producción con zero-downtime deploys, observabilidad y seguridad
# Uso: docker stack deploy -c docker-swarm-stack.yml msp

version: "3.9"

services:
  # === CORE SERVICES ===
  msp_backend:
    image: registry.mega.cl/megati/msp-backend:${MSP_VERSION:-latest}
    networks:
      - traefik-network
      - msp_network
    deploy:
      replicas: 3
      update_config:
        order: start-first
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-network"
        - "traefik.http.routers.msp-backend.rule=Host(`api-msp.mega.cl`)"
        - "traefik.http.routers.msp-backend.entrypoints=https"
        - "traefik.http.routers.msp-backend.tls=true"
        - "traefik.http.services.msp-backend.loadbalancer.server.port=8080"
        - "traefik.http.services.msp-backend.loadbalancer.healthcheck.path=/actuator/health"
        - "traefik.http.services.msp-backend.loadbalancer.healthcheck.interval=10s"
        - "traefik.http.services.msp-backend.loadbalancer.healthcheck.timeout=5s"
    environment:
      - SPRING_PROFILES_ACTIVE=prod,swarm
      - SERVER_PORT=8080
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom
      - SPRING_DATASOURCE_URL=jdbc:postgresql://msp_postgres:5432/msp_prod
      - SPRING_DATASOURCE_USERNAME_FILE=/run/secrets/msp_db_user
      - SPRING_DATASOURCE_PASSWORD_FILE=/run/secrets/msp_db_pass
      - SPRING_REDIS_HOST=msp_redis
      - SPRING_REDIS_PASSWORD_FILE=/run/secrets/msp_redis_pass
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=msp_kafka:9092
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=when_authorized
    secrets:
      - msp_db_user
      - msp_db_pass
      - msp_redis_pass
    configs:
      - source: msp_application_prod
        target: /app/config/application-prod.yml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  msp_frontend:
    image: registry.mega.cl/megati/msp-frontend:${MSP_VERSION:-latest}
    networks:
      - traefik-network
      - msp_network
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 20s
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-network"
        - "traefik.http.routers.msp-frontend.rule=Host(`app-msp.mega.cl`)"
        - "traefik.http.routers.msp-frontend.entrypoints=https"
        - "traefik.http.routers.msp-frontend.tls=true"
        - "traefik.http.services.msp-frontend.loadbalancer.server.port=80"
    configs:
      - source: msp_nginx_frontend
        target: /etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === DATA STORES ===
  msp_postgres:
    image: postgres:15-alpine
    networks:
      - msp_network
    volumes:
      - msp_postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.msp.datastore == true
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    environment:
      - POSTGRES_DB=msp_prod
      - POSTGRES_USER_FILE=/run/secrets/msp_db_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/msp_db_pass
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    secrets:
      - msp_db_user
      - msp_db_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/msp_db_user) -d msp_prod"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  msp_redis:
    image: redis:7-alpine
    networks:
      - msp_network
    command: >
      sh -c "redis-server
      --requirepass $$(cat /run/secrets/msp_redis_pass)
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec"
    volumes:
      - msp_redis_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.msp.datastore == true
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    secrets:
      - msp_redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === MESSAGING ===
  msp_zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    networks:
      - msp_network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - msp_zookeeper_data:/var/lib/zookeeper/data
      - msp_zookeeper_logs:/var/lib/zookeeper/log
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.msp.datastore == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  msp_kafka:
    image: confluentinc/cp-kafka:7.5.0
    networks:
      - msp_network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: msp_zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://msp_kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - msp_kafka_data:/var/lib/kafka/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.msp.datastore == true
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # === STORAGE ===
  msp_minio:
    image: minio/minio:latest
    networks:
      - traefik-network
      - msp_network
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER_FILE=/run/secrets/msp_minio_user
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/msp_minio_pass
    volumes:
      - msp_minio_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.msp.datastore == true
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-network"
        - "traefik.http.routers.msp-minio.rule=Host(`storage-msp.mega.cl`)"
        - "traefik.http.routers.msp-minio.entrypoints=https"
        - "traefik.http.routers.msp-minio.tls=true"
        - "traefik.http.services.msp-minio.loadbalancer.server.port=9001"
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    secrets:
      - msp_minio_user
      - msp_minio_pass

  # === MONITORING ===
  msp_prometheus:
    image: prom/prometheus:v2.48.0
    networks:
      - traefik-network
      - msp_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - msp_prometheus_data:/prometheus
    configs:
      - source: msp_prometheus_config
        target: /etc/prometheus/prometheus.yml
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-network"
        - "traefik.http.routers.msp-prometheus.rule=Host(`metrics-msp.mega.cl`)"
        - "traefik.http.routers.msp-prometheus.entrypoints=https"
        - "traefik.http.routers.msp-prometheus.tls=true"
        - "traefik.http.services.msp-prometheus.loadbalancer.server.port=9090"
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  msp_grafana:
    image: grafana/grafana:10.2.3
    networks:
      - traefik-network
      - msp_network
    environment:
      - GF_SECURITY_ADMIN_USER_FILE=/run/secrets/msp_grafana_user
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/msp_grafana_pass
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitor-msp.mega.cl
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - msp_grafana_data:/var/lib/grafana
      - msp_grafana_provisioning:/etc/grafana/provisioning
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-network"
        - "traefik.http.routers.msp-grafana.rule=Host(`monitor-msp.mega.cl`)"
        - "traefik.http.routers.msp-grafana.entrypoints=https"
        - "traefik.http.routers.msp-grafana.tls=true"
        - "traefik.http.services.msp-grafana.loadbalancer.server.port=3000"
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    secrets:
      - msp_grafana_user
      - msp_grafana_pass

  # === NODE MONITORING (Global) ===
  msp_cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    networks:
      - msp_network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  msp_node_exporter:
    image: prom/node-exporter:v1.7.0
    networks:
      - msp_network
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

# === NETWORKS ===
networks:
  traefik-network:
    external: true
  msp_network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.100.0/24

# === VOLUMES ===
volumes:
  msp_postgres_data:
    driver: local
  msp_redis_data:
    driver: local
  msp_zookeeper_data:
    driver: local
  msp_zookeeper_logs:
    driver: local
  msp_kafka_data:
    driver: local
  msp_minio_data:
    driver: local
  msp_prometheus_data:
    driver: local
  msp_grafana_data:
    driver: local
  msp_grafana_provisioning:
    driver: local

# === CONFIGS ===
configs:
  msp_application_prod:
    external: true
  msp_nginx_frontend:
    external: true
  msp_prometheus_config:
    external: true

# === SECRETS ===
secrets:
  msp_db_user:
    external: true
  msp_db_pass:
    external: true
  msp_redis_pass:
    external: true
  msp_minio_user:
    external: true
  msp_minio_pass:
    external: true
  msp_grafana_user:
    external: true
  msp_grafana_pass:
    external: true
